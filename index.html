<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>One Question</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="front.css">
</head>
<body>
  <div class="page-glow page-glow--left" aria-hidden="true"></div>
  <div class="page-glow page-glow--right" aria-hidden="true"></div>
  <div class="page-grain" aria-hidden="true"></div>
  <div class="particle-field" id="particleField" aria-hidden="true"></div>

  <main class="front-layout">
    <section class="front-card">
      <p class="eyebrow">For my forever girl</p>
      <h1>I have one beautiful question for you.</h1>
      <p class="lead">Only one answer opens the page I made with all my heart.</p>

      <div class="choice-stage">
        <a class="button button--primary" id="yesLink" href="proposal.html">Yes</a>
        <button class="button button--secondary button--no" id="noButton" type="button">No</button>
      </div>

      <p class="choice-hint" id="choiceHint">Only yes knows the way forward.</p>
    </section>
  </main>

  <script src="front.js"></script>
</body>
</html>
